name: code-review-env
version: "0.2.0"
description: >-
  A multi-step AI training environment for code review, bug explanation, and fix generation.
language: python
entrypoint: backend.env.environment:CodeReviewEnvironment
action: ReviewAction
observation: CodeReviewObservation
reward: RewardState
apis:
  reset: reset(task_id: str | None = None) -> CodeReviewObservation
  step: step(action: ReviewAction) -> tuple[CodeReviewObservation, float, bool, dict]
  state: state() -> EnvironmentState
action_schema:
  type: object
  properties:
    type:
      type: string
      enum: [review, fix]
      description: Whether the agent is submitting reasoning or corrected code.
    content:
      type: string
      description: Free-form review text or corrected code for the current phase.
  required:
    - type
    - content
observation_schema:
  type: object
  properties:
    task_id:
      type: string
    difficulty:
      type: string
      enum: [easy, medium, hard]
    title:
      type: string
    code:
      type: string
    prompt:
      type: string
    phase:
      type: string
      enum: [identify_bug, explain_issue, fix_code]
    expected_action_type:
      type: string
      enum: [review, fix]
    step_index:
      type: integer
    remaining_steps:
      type: integer
  required:
    - task_id
    - difficulty
    - title
    - code
    - prompt
    - phase
    - expected_action_type
    - step_index
    - remaining_steps
reward_schema:
  type: object
  properties:
    score:
      type: number
      minimum: -0.5
      maximum: 1.0
    verdict:
      type: string
      enum: [full_match, partial_match, wrong]
    breakdown:
      type: object
      properties:
        bug_detected:
          type: number
        explanation:
          type: number
        fix:
          type: number
        structure_bonus:
          type: number
        irrelevant_penalty:
          type: number
        hallucinated_fix_penalty:
          type: number
        total:
          type: number
    matched_keywords:
      type: array
      items:
        type: string
    missing_keywords:
      type: array
      items:
        type: string
    semantic_overlap:
      type: number
    rationale:
      type: string
    feedback:
      type: string
    phase:
      type: string
      enum: [identify_bug, explain_issue, fix_code]
    expected_action_type:
      type: string
      enum: [review, fix]
    action_type:
      type: string
      enum: [review, fix]
    step_index:
      type: integer
  required:
    - score
    - verdict
    - breakdown
    - matched_keywords
    - missing_keywords
    - semantic_overlap
    - rationale
    - feedback
    - phase
    - expected_action_type
    - action_type
    - step_index
